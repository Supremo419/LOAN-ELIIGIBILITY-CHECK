<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8>"
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Check</title>
    <style>
        body {
            /*Rich, dark cinematic gradient*/
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: o;
        }
        .card{
            background-color: var(--bg-color);
            border: 1px solid var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 36px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0, 0.25);
        }
        .container{
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0,1);
            width:100%;
            max-width: 500px;
        }
        /*The master card containing both the title and the form container*/
        .main-wrapper {
            display: flex;
            flex-direction: column; /*Forces items to stack vertically instead of side-by-side instead*/
            align-items: center;
            width: 100%;
            max-width: 440px;
        }
        h2{ 
            text-align: center;
            color: #ffffff; /*Pure white heading*/
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-box: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .sucess {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid solid #c3e6cb
        }
        .error-message{
            color: #FFD700 !important; 
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
      <h2><center>LOAN ELIGIBILITY CHECK</center></h2>
      <div class="container">
    <form method="POST">
        <div class="form-group">
            <label for="income">Monthly income:</label>
            <input type="number" id="income" name="income" step="0.01" required placeholders="e.g. 5000">
        </div>
        <div class="form-group">
            <label for="debt">Current debt:</label>
            <input type="number" id="debt" name="debt" step="0.01" required placeholders="e.g. 2000">
        </div>
        <div class="form-group">
            <label for="date of birth">Date of Birth:</label>
            <input type="date" id="date of birth" name="date of birth" step="0.01" required placeholders="e.g. YYYY-MM-DD">
        </div>
        <div class="form-group">
            <label for="employment status">Employment Status:</label>
            <select id="employment_status" name="employment_status" required>
                <option value="disabled selected">Select your employment status</option>
                <option value="full-time">Full-Time Employed</option>
                <option value="part-time">Part-Time Employed</option>
                <option value="self-employed">Self-Employed</option>
                <option value="student">Student</option>
                <option value="unemployed">Unemployed</option>
            </select>
        </div>
        <button type="submit" style="padding: 12px 24px; font-size: 16px; min-width: cursor: pointer;">Check Eligibility</button>
    </form>
    {% if result%}
       <div class="result-box {%if 'Congratulations' in result %}sucess{% else %}error{% endif %}">
         {{result}}
       </div>
    {% endif %}
    </div>
</body>
</html>
